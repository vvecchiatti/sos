<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Söuthsea Swimrun</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#080808">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--black:#080808;--white:#fff;--accent:#00D44A;--accent-light:#00eb52;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--black);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;line-height:1.7;}
.wrap{max-width:520px;}
.code{font-family:var(--font-display);font-size:clamp(5rem,18vw,9rem);line-height:0.9;letter-spacing:0.03em;color:var(--white);}
.code span{color:var(--accent-light);}
h1{font-family:var(--font-display);font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:0.03em;margin:0.5rem 0 1rem;}
p{color:rgba(255,255,255,0.6);font-weight:300;margin-bottom:2rem;}
.actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
a.btn{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;padding:0.85rem 1.75rem;border-radius:4px;transition:background 0.2s,color 0.2s,transform 0.15s;}
a.primary{background:var(--accent);color:var(--white);}
a.primary:hover{background:var(--accent-light);transform:translateY(-2px);}
a.ghost{border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);}
a.ghost:hover{border-color:var(--white);color:var(--white);}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">4<span>0</span>4</div>
  <h1>Lost at sea.</h1>
  <p>This page swam off somewhere. It may have moved, or never existed. Let's get you back on dry land.</p>
  <div class="actions">
    <a href="/" class="btn primary">Back to home</a>
    <a href="/blog.html" class="btn ghost">Race reports &amp; blog</a>
  </div>
</div>
</body>
</html>
